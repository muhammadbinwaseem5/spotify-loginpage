<!DOCTYPE html>
<html lang="en">
<head>
<title>Spotify login page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="container">
    <img src="image.png" alt="Spotify" class="logo">
<h1>Log in to Spotify</h1>
<form>
    <label for="email">Email</label>
    <input type="text" id="email">
    <button type="submit" class="continuebtn">Continue</button>
</form>
    <p>or</p>
    <button type="button" class="googlebtn"><i class="fa-brands fa-google"></i>Continue with Google</button>
    <button type="button" class="facebookbtn"><i class="fa-brands fa-facebook"></i>Continue with Facebook</button>
    <button type="button" class="applebtn"><i class="fa-brands fa-apple"></i>Continue with Apple</button>
    <p class="signup">Don't have an account?</p>
    <a href="wwww.spotify.com" class="signupbtn" ><b>Sign up</b></a>
</div>
</body>
</html>
